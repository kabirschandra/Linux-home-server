# Reverse proxy configuration for internal services

server {

    # Listen for HTTP
    listen 80;

    # Local DNS hostname
    server_name jellyfin.home;

    location / {

        # Route to Jellyfin container
        proxy_pass http://127.0.0.1:8096;

        # Preserve original request metadata
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {

    listen 80;
    server_name kuma.home;

    location / {

        # Route to Uptime Kuma
        proxy_pass http://127.0.0.1:3001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {

    listen 80;
    server_name grafana.home;

    location / {

        # Route to Grafana dashboard
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {

    listen 80;
    server_name prometheus.home;

    location / {

        # Route traffic to Prometheus
        proxy_pass http://127.0.0.1:9090;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}






